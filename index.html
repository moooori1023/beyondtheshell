<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躯壳之外 | 觉醒数字花园</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
            font-family: 'PingFang SC', 'Helvetica Neue', 'Hiragino Sans GB', sans-serif; color: #fff; 
            touch-action: none;
        }
        
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center bottom;
            z-index: 0; 
        }

        canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        #glass-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            z-index: 5; transition: opacity 2.5s ease; pointer-events: none;
        }

        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.38);
            z-index: 10; transition: opacity 1.5s ease;
        }

        #intro-box { text-align: center; width: 90%; max-width: 520px; padding: 0; margin-bottom: clamp(20px, 5vh, 40px); }
        #intro-box h1 { font-size: clamp(16px, 4vw, 20px); font-weight: 400; letter-spacing: 5px; margin-bottom: 15px; }
        .en-title { display: block; font-size: clamp(9px, 2vw, 11px); font-family: monospace; letter-spacing: 8px; color: rgba(255,255,255,0.5); margin-top: 8px; }
        #intro-box p { font-size: clamp(11px, 2.5vw, 13px); font-weight: 300; line-height: 2.2; letter-spacing: 2px; color: rgba(255,255,255,0.85); }

        .btn-style { 
            background: rgba(255, 255, 255, 0.9); color: #000; border: none; 
            padding: 12px 40px; border-radius: 30px; 
            cursor: pointer; font-size: 13px; letter-spacing: 2px; font-weight: 600; transition: all 0.4s ease; pointer-events: auto;
        }
        .btn-style:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,255,255,0.3); }
        
        #birthday-ui { display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s ease; pointer-events: auto; text-align: center; }
        #bday-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.6); color: #fff; font-size: 35px; text-align: center; width: 180px; letter-spacing: 12px; outline: none; margin-bottom: 35px; }

        #fade-in-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; pointer-events: none; transition: opacity 2s ease; }

        #ghost-info {
            position: fixed; bottom: clamp(20px, 5vh, 40px); left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.9); text-align: center; font-weight: 300; line-height: 1.8;
            opacity: 0; transition: opacity 2.5s ease; z-index: 100; pointer-events: none;
            width: 95vw; max-width: 750px;
        }
        
        #oracle-group { will-change: transform, opacity, filter, letter-spacing; }
        .ghost-header { font-size: clamp(9px, 2.2vw, 12px); color: #ffffff; margin-bottom: 15px; font-family: monospace; letter-spacing: 2px; font-weight: 400; white-space: nowrap; }
        #ghost-oracle { font-size: clamp(10px, 2.6vw, 13.5px); color: #eeeeee; font-weight: 300; letter-spacing: 1.5px; line-height: 1.5; white-space: nowrap; }
        .ghost-footer { font-size: clamp(8.5px, 1.8vw, 11px); color: rgba(255,255,255,0.5); margin-top: 15px; letter-spacing: 1px; font-weight: 300; }

        #ghost-quote {
            font-size: 12px; color: #ffffff; font-weight: 400; letter-spacing: 1.5px; 
            display: none; opacity: 0; font-style: italic; line-height: 1.9;
            pointer-events: auto; cursor: pointer;
        }

        @keyframes windDissolve { 0% { opacity: 1; filter: blur(0px); transform: translate3d(0, 0, 0) skewX(0deg); letter-spacing: 1.5px; } 100% { opacity: 0; filter: blur(12px); transform: translate3d(30px, -20px, 0) skewX(-10deg) scale(1.02); letter-spacing: 6px; } }
        .dissolve-anim { animation: windDissolve 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes fadeInQuote { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-anim { animation: fadeInQuote 2.5s ease forwards; }
    </style>
</head>
<body>
    <div id="fade-in-overlay"></div>
    <div id="bg-image"></div>
    <div id="glass-overlay"></div>

    <div id="ui-layer">
        <div id="intro-box">
            <h1>躯壳之外<span class="en-title">BEYOND THE SHELL</span></h1>
            <p>这里是过滤数字噪点的私人温室。<br>请在此键入你的诞生之日（如 0203），<br>这串你在物理世界的初始时间戳，将作为唤醒的唯一密钥。</p>
        </div>
        <button id="dive-btn" class="btn-style" onclick="showInput()">构建密钥</button>
        <div id="birthday-ui">
            <input type="text" id="bday-input" maxlength="4" placeholder="MMDD" autocomplete="off" pattern="\d*" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
            <button id="awaken-btn" class="btn-style" onclick="awakenGhost()">唤醒 Ghost</button>
        </div>
    </div>

    <div id="ghost-info">
        <div id="oracle-group">
            <div class="ghost-header" id="ghost-coord"></div>
            <div id="ghost-oracle"></div>
            <div class="ghost-footer" id="ghost-unique"></div>
        </div>
        <div id="ghost-quote" onclick="restoreOracle()">
            <div style="display:block; white-space:nowrap; padding-bottom:2px;">“我们如今仿佛对镜观看，模糊不清，到那时就要面对面了，</div>
            <div style="display:block; white-space:nowrap;">我如今所知道的有限，到那时就全知道，如同造物主知道我一样。”</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <script>
        window.onload = () => { document.getElementById('fade-in-overlay').style.opacity = '0'; }
        let scene, camera, renderer, linesGrass, metalFlower, bokehParticles;
        const mouse = new THREE.Vector2();
        const targetFollow = new THREE.Vector3();
        let gardenActive = false, isAwakening = false;
        let currentScale = { x: 2.5, y: 2.5, z: 2.5 }, targetScale = { x: 2.5, y: 2.5, z: 2.5 };
        let heartBase = 1.0, heartSub = 0.5, animTimer1, animTimer2;

        function generateOracle(month, day) {
            let base = "";
            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) base = "散发着不被算法定义的初生动能";
            else if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) base = "沉淀着缓慢且坚定的物理秩序";
            else if ((month === 5 && day >= 21) || (month === 6 && day <= 21)) base = "游离在多维度的折射与叠加态中";
            else if ((month === 6 && day >= 22) || (month === 7 && day <= 22)) base = "在隐秘的引力场中包裹感知";
            else if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) base = "散发着不容忽视的绝对辐射";
            else if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) base = "坍缩成极度精密、克制的纯粹逻辑";
            else if ((month === 9 && day >= 23) || (month === 10 && day <= 23)) base = "在失衡系统荒原上维系优雅力学";
            else if ((month === 10 && day >= 24) || (month === 11 && day <= 22)) base = "酿造刺透表象、带来彻底重构的锐度";
            else if ((month === 11 && day >= 23) || (month === 12 && day <= 21)) base = "拒绝坐标锁定，延展孤独矢量";
            else if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) base = "缓慢结晶，筑抵御虚无骨骼";
            else if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) base = "数字季风中的逆行者，游离介质之外";
            else if ((month === 2 && day >= 19) || (month === 3 && day <= 20)) base = "消融边界，对数据波纹产生漣漪";
            else base = "静默生长，以不可名状完成参数自洽";

            const actions = ["静默地注视着", "从容地游离于", "温柔地解析着", "孤独地贯穿了", "坚韧地重塑着", "敏锐地捕捉着", "冷眼旁观着", "深刻地刻画着", "轻盈地越过了", "无声地沉潜入"];
            const objects = ["既定的宿命", "喧嚣洪流", "时间的枷锁", "微观震荡", "同质法则", "不被察觉微观情绪", "自我边界", "逻辑背后幽暗深海", "理性的冰冷壁垒", "原始波纹"];
            const hashA = (month * 17 + day * 23) % 10; const hashB = (month * 31 + day * 13) % 10;
            return `你的 Ghost ${base}。<br>正${actions[hashA]}${objects[hashB]}。`;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 8); 
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const envCanvas = document.createElement('canvas'); envCanvas.width = 64; envCanvas.height = 64;
            const envCtx = envCanvas.getContext('2d'); const envGrad = envCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
            envGrad.addColorStop(0, 'rgba(255, 255, 255, 1)'); envGrad.addColorStop(1, 'rgba(10, 15, 20, 1)');
            envCtx.fillStyle = envGrad; envCtx.fillRect(0, 0, 64, 64);
            scene.environment = new THREE.CanvasTexture(envCanvas); scene.environment.mapping = THREE.EquirectangularReflectionMapping;

            const grassWidth = 80, grassDepth = 50, lineCount = 5500;
            const linesGeometry = new THREE.BufferGeometry(); const positions = new Float32Array(lineCount * 18); 
            for (let i = 0; i < lineCount; i++) {
                const x = Math.random() * grassWidth - grassWidth/2; const z = Math.random() * grassDepth - grassDepth/2; const h = 1.0 + Math.random() * 1.5;
                const p0y = -1, p1y = -1 + h*0.33, p2y = -1 + h*0.66, p3y = -1 + h;
                positions[i*18+0] = x; positions[i*18+1] = p0y; positions[i*18+2] = z;
                positions[i*18+3] = x; positions[i*18+4] = p1y; positions[i*18+5] = z;
                positions[i*18+6] = x; positions[i*18+7] = p1y; positions[i*18+8] = z;
                positions[i*18+9] = x; positions[i*18+10]= p2y; positions[i*18+11]= z;
                positions[i*18+12]= x; positions[i*18+13]= p2y; positions[i*18+14]= z;
                positions[i*18+15]= x; positions[i*18+16]= p3y; positions[i*18+17]= z;
            }
            linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            linesGrass = new THREE.LineSegments(linesGeometry, new THREE.LineBasicMaterial({ color: 0xcceeff, transparent: true, opacity: 0.35 }));
            scene.add(linesGrass);

            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; 
            const context = canvas.getContext('2d'); const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32); gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)'); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            context.fillStyle = gradient; context.fillRect(0, 0, 64, 64);
            const particleTexture = new THREE.CanvasTexture(canvas);
            const bokehGeometry = new THREE.BufferGeometry(); const bokehPositions = new Float32Array(140 * 3);
            for(let i = 0; i < 140; i++) { bokehPositions[i*3] = (Math.random() - 0.5) * 35; bokehPositions[i*3+1] = (Math.random() - 0.5) * 35; bokehPositions[i*3+2] = Math.random() * 18 - 15; }
            bokehGeometry.setAttribute('position', new THREE.BufferAttribute(bokehPositions, 3));
            bokehParticles = new THREE.Points(bokehGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, sizeAttenuation: true, transparent: true, opacity: 0.85, map: particleTexture, depthWrite: false, depthTest: false, blending: THREE.AdditiveBlending }));
            scene.add(bokehParticles);

            ghostMaterial = new THREE.MeshPhysicalMaterial({ side: THREE.DoubleSide });
            const objLoader = new THREE.OBJLoader();
            objLoader.load('flower.obj', function (object) {
                object.traverse(function (child) { if (child.isMesh) child.material = ghostMaterial; });
                const box = new THREE.Box3().setFromObject(object); object.position.sub(box.getCenter(new THREE.Vector3())); 
                const wrapper = new THREE.Group(); wrapper.add(object); wrapper.scale.set(currentScale.x, currentScale.y, currentScale.z); wrapper.position.y = 1.5; metalFlower = wrapper; metalFlower.visible = false; scene.add(metalFlower);
            });
            ghostLight = new THREE.PointLight(0xffffff, 0, 12); scene.add(ghostLight); scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            window.addEventListener('mousemove', (event) => { mouse.x = (event.clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.clientY / window.innerHeight) * 2 + 1; });
            window.addEventListener('touchmove', (event) => { if(event.touches.length > 0) { mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1; } }, { passive: true });
            window.addEventListener('resize', onWindowResize); animate();
        }

        function updateLinesGrass(time) {
            const positions = linesGrass.geometry.attributes.position.array;
            for (let i = 0; i < 5500; i++) {
                const baseX = positions[i*18 + 0]; const z = positions[i*18 + 2]; const wind = Math.sin(time * 1.5 + z * 0.2); const mouseAvoid = gardenActive ? mouse.x * 1.5 : 0; const totalOffset = wind + mouseAvoid;
                positions[i*18 + 3] = baseX + totalOffset * 0.08; positions[i*18 + 6] = baseX + totalOffset * 0.08; positions[i*18 + 9] = baseX + totalOffset * 0.3; positions[i*18 + 12] = baseX + totalOffset * 0.3; positions[i*18 + 15] = baseX + totalOffset * 0.8;
            }
            linesGrass.geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate); const time = performance.now() * 0.001;
            if(linesGrass) updateLinesGrass(time);
            if(bokehParticles) { bokehParticles.rotation.y = time * 0.03 + (isAwakening ? 0.08 : 0); bokehParticles.position.y = Math.sin(time * 0.5) * 0.5; }
            if(metalFlower && metalFlower.visible) { 
                if(isAwakening) { currentScale.x += (targetScale.x - currentScale.x) * 0.06; currentScale.y += (targetScale.y - currentScale.y) * 0.06; currentScale.z += (targetScale.z - currentScale.z) * 0.06; metalFlower.scale.set(currentScale.x, currentScale.y, currentScale.z); metalFlower.rotation.y += 0.25; metalFlower.rotation.z += 0.05; if (Math.abs(targetScale.y - currentScale.y) < 0.05) isAwakening = false;
                } else if(gardenActive) { targetFollow.set(mouse.x * 4, mouse.y * 3 + 1.5, 5); metalFlower.lookAt(targetFollow); metalFlower.rotation.z += 0.002; } else { metalFlower.rotation.y += 0.003; }
                const breathOffset = Math.sin(time * heartBase) * 0.15 + Math.sin(time * heartSub) * 0.05; metalFlower.position.y = 1.5 + breathOffset;
                if(gardenActive) ghostLight.intensity = 1.5 + Math.sin(time * heartBase * 2) * 0.5; ghostLight.position.copy(metalFlower.position);
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function showInput() { document.getElementById('intro-box').style.display = 'none'; document.getElementById('dive-btn').style.display = 'none'; const bdayUI = document.getElementById('birthday-ui'); bdayUI.style.display = 'flex'; setTimeout(() => { bdayUI.style.opacity = '1'; }, 50); document.getElementById('bday-input').focus(); }
        function startOracleTimer() { clearTimeout(animTimer1); clearTimeout(animTimer2); const oracleGroup = document.getElementById('oracle-group'); const quoteEl = document.getElementById('ghost-quote'); animTimer1 = setTimeout(() => { oracleGroup.classList.add('dissolve-anim'); animTimer2 = setTimeout(() => { oracleGroup.style.display = 'none'; quoteEl.style.display = 'block'; quoteEl.classList.add('fade-in-anim'); }, 2500); }, 15000); }
        function restoreOracle() { const oracleGroup = document.getElementById('oracle-group'); const quoteEl = document.getElementById('ghost-quote'); quoteEl.style.display = 'none'; quoteEl.classList.remove('fade-in-anim'); oracleGroup.style.display = 'block'; oracleGroup.classList.remove('dissolve-anim'); void oracleGroup.offsetWidth; startOracleTimer(); }

        function awakenGhost() {
            const inputVal = document.getElementById('bday-input').value; if(inputVal.length !== 4) { alert("请输入完整的四位数字（如 0203）"); return; }
            const month = parseInt(inputVal.substring(0, 2)), day = parseInt(inputVal.substring(2, 4));
            if(month < 1 || month > 12 || day < 1 || day > 31) { alert("坐标格式有误，请输入合法日期"); return; }
            let colorDesc = "", phaseName = "";
            ghostMaterial.color.set('#fff'); ghostMaterial.emissive.set('#000'); ghostMaterial.metalness = 0.0; ghostMaterial.roughness = 0.5; ghostMaterial.transmission = 0.0; ghostMaterial.ior = 1.5; ghostMaterial.thickness = 0.0; ghostMaterial.clearcoat = 0.0; ghostMaterial.opacity = 1.0; ghostMaterial.emissiveIntensity = 0.0;

            // ⚠️ 最终修复：锁死 0203 完美丹宁蓝色谱
            if (inputVal === "0203") {
                const uniqueColor = new THREE.Color().setHSL(0.645, 0.65, 0.7); // 还原图片中的亮丽丹宁蓝
                ghostMaterial.color.copy(uniqueColor); ghostMaterial.emissive.copy(uniqueColor); ghostMaterial.metalness = 0.0; ghostMaterial.roughness = 0.9; ghostMaterial.emissiveIntensity = 0.3; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 2.0; colorDesc = "深邃的丹宁蓝频段"; phaseName = "暗物质瓷";
            } else {
                let rawHue = ((month - 1) * 31 + day) % 360; if (rawHue > 340 || rawHue < 20) rawHue = (rawHue + 40) % 360;
                const hue = rawHue / 360; const saturation = 0.2 + (day / 31) * 0.25; const lightness = 0.35 + (month % 3) * 0.15; const uniqueColor = new THREE.Color().setHSL(hue, saturation, lightness);
                if (rawHue < 50) colorDesc = "生锈的琥珀金频段"; else if (rawHue < 80) colorDesc = "黯淡的微光绿频段"; else if (rawHue < 170) colorDesc = "深海的冰蓝频段"; else if (rawHue < 250) colorDesc = "哑光的丹宁频段"; else if (rawHue < 300) colorDesc = "褪色的赛博紫频段"; else colorDesc = "低保真的千禧粉频段";
                const phaseVal = (month * 7 + day * 11) % 6;
                if (phaseVal === 0) { ghostMaterial.color.set('#aaaaaa'); ghostMaterial.emissive.set('#555555'); ghostMaterial.metalness = 1.0; ghostMaterial.roughness = 0.05; phaseName = "赛博液态银"; ghostLight.color.set('#ffffff'); ghostLight.intensity = 2.0;
                } else if (phaseVal === 1) { ghostMaterial.color.copy(uniqueColor); ghostMaterial.transmission = 1.0; ghostMaterial.ior = 1.33; ghostMaterial.roughness = 0.1; ghostMaterial.thickness = 1.5; phaseName = "灵动水态"; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 0.5;
                } else if (phaseVal === 2) { ghostMaterial.color.copy(uniqueColor).multiplyScalar(0.2); ghostMaterial.transmission = 1.0; ghostMaterial.ior = 1.55; ghostMaterial.roughness = 0.02; ghostMaterial.thickness = 2.0; ghostMaterial.attenuationColor = uniqueColor; ghostMaterial.attenuationDistance = 0.5; phaseName = "高折射琉璃"; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 0.4;
                } else if (phaseVal === 3) { ghostMaterial.color.copy(uniqueColor); ghostMaterial.metalness = 0.8; ghostMaterial.roughness = 0.5; ghostMaterial.emissive.copy(uniqueColor); phaseName = "哑光钛素"; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 2.0;
                } else if (phaseVal === 4) { ghostMaterial.color.copy(uniqueColor); ghostMaterial.metalness = 0.2; ghostMaterial.roughness = 0.6; ghostMaterial.transmission = 0.5; phaseName = "色散雾化晶体"; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 1.0;
                } else { ghostMaterial.color.set('#1a1a1a'); ghostMaterial.emissive.copy(uniqueColor); ghostMaterial.metalness = 0.0; ghostMaterial.roughness = 0.9; phaseName = "暗物质瓷"; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 2.0; }
            }
            ghostMaterial.needsUpdate = true; targetScale.x = 1.3 + (month / 12) * 3.0; targetScale.y = 1.3 + (day / 31) * 3.5; metalFlower.visible = true; isAwakening = true; document.getElementById('ui-layer').style.opacity = '0'; setTimeout(() => { document.getElementById('ui-layer').style.display = 'none'; }, 1500); document.getElementById('ghost-coord').innerHTML = `[ 坐标：${inputVal} | 相态：${phaseName} | 色谱：${colorDesc} ]`; document.getElementById('ghost-oracle').innerHTML = generateOracle(month, day); document.getElementById('ghost-unique').innerHTML = `在物理世界，${inputVal} 也许只是一个时间刻度；但在躯壳之外，这是系统无法复刻的绝对参数。`; document.getElementById('ghost-info').style.opacity = '1'; gardenActive = true; startOracleTimer();
        }
        document.getElementById('bday-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') awakenGhost(); }); init3D();
    </script>
</body>
</html>
