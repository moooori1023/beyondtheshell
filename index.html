<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躯壳之外 | 觉醒数字花园</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
            font-family: 'PingFang SC', 'Helvetica Neue', 'Hiragino Sans GB', sans-serif; color: #fff; 
            touch-action: none;
        }
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 110vh;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center bottom;
            z-index: 0;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        #glass-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0); 
            backdrop-filter: none; -webkit-backdrop-filter: none;
            z-index: 5; transition: opacity 2.5s ease; pointer-events: none;
        }
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.30);
            z-index: 10; transition: opacity 1.5s ease;
        }
        #intro-box { text-align: center; width: 90%; max-width: 520px; padding: 0; margin-bottom: clamp(20px, 5vh, 40px); }
        #intro-box h1 { font-size: clamp(16px, 4vw, 20px); font-weight: 400; letter-spacing: 5px; margin-bottom: 15px; color: #fff; line-height: 1.4; }
        .en-title { display: block; font-size: clamp(9px, 2vw, 11px); font-family: monospace; letter-spacing: 8px; color: rgba(255,255,255,0.5); margin-top: 8px; font-weight: 300; }
        #intro-box p { font-size: clamp(11px, 2.5vw, 13px); font-weight: 300; line-height: 2.2; letter-spacing: 2px; color: rgba(255,255,255,0.85); }
        .btn-style { background: rgba(255, 255, 255, 0.9); color: #000; border: none; padding: clamp(10px, 2vh, 12px) clamp(30px, 6vw, 40px); border-radius: 30px; cursor: pointer; font-size: clamp(11px, 2.5vw, 13px); letter-spacing: 2px; font-weight: 600; transition: all 0.4s ease; pointer-events: auto; }
        #birthday-ui { display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s ease; pointer-events: auto; text-align: center; }
        #bday-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.6); color: #fff; font-size: clamp(26px, 6vw, 35px); text-align: center; width: clamp(140px, 40vw, 180px); letter-spacing: 12px; outline: none; font-family: 'Courier New', Courier, monospace; font-weight: 300; margin-bottom: 35px; padding-bottom: 5px; transition: border-color 0.3s ease; }
        #fade-in-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; pointer-events: none; transition: opacity 2s ease; }
        
        /* 判词容器修复：确保折行 */
        #ghost-info { 
            position: fixed; bottom: clamp(30px, 8vh, 60px); left: 50%; transform: translateX(-50%); 
            color: rgba(255,255,255,0.9); text-align: center; opacity: 0; transition: opacity 2.5s ease; 
            z-index: 100; pointer-events: none; width: 85vw; max-width: 600px; 
        }
        .ghost-header { font-size: clamp(9px, 2.2vw, 11px); color: rgba(255,255,255,0.7); margin-bottom: 15px; font-family: monospace; letter-spacing: 2px; }
        
        /* ⚠️ 核心修复 1：判词折行控制 */
        #ghost-oracle { 
            font-size: clamp(10px, 2.8vw, 13px); color: #eeeeee; font-weight: 300; 
            letter-spacing: 1.5px; line-height: 1.8; 
            white-space: normal; /* 允许换行 */
            word-break: break-all; /* 强制在窄屏处折断 */
            display: block; width: 100%;
        }
        
        /* ⚠️ 核心修复 2：灰色小字加粗加亮 */
        .ghost-footer { 
            font-size: clamp(9px, 2.2vw, 11px); 
            color: rgba(255,255,255,0.6); /* 稍微调亮 */
            margin-top: 20px; letter-spacing: 1px; 
            font-weight: 500; /* 加粗到500 */
            line-height: 1.6;
        }

        #ghost-quote { font-size: clamp(10px, 2.8vw, 13px); color: #ffffff; font-weight: 400; letter-spacing: 1.2px; display: none; opacity: 0; font-style: italic; line-height: 2.2; pointer-events: auto; cursor: pointer; }
        @keyframes windDissolve { 0% { opacity: 1; filter: blur(0px); transform: translate3d(0,0,0); } 100% { opacity: 0; filter: blur(15px); transform: translate3d(20px,-10px,0); } }
        .dissolve-anim { animation: windDissolve 3s ease forwards; }
    </style>
</head>
<body>
    <div id="fade-in-overlay"></div>
    <div id="bg-image"></div>
    <div id="glass-overlay"></div>
    <div id="ui-layer">
        <div id="intro-box">
            <h1>躯壳之外<span class="en-title">BEYOND THE SHELL</span></h1>
            <p>这里是过滤数字噪点的私人温室。<br>请在此键入你的诞生之日（如 0203）</p>
        </div>
        <button id="dive-btn" class="btn-style" onclick="showInput()">构建密钥</button>
        <div id="birthday-ui">
            <input type="text" id="bday-input" maxlength="4" placeholder="MMDD" inputmode="numeric">
            <button id="awaken-btn" class="btn-style" onclick="awakenGhost()">唤醒 Ghost</button>
        </div>
    </div>
    <div id="ghost-info">
        <div id="oracle-group">
            <div class="ghost-header" id="ghost-coord"></div>
            <div id="ghost-oracle"></div>
            <div class="ghost-footer" id="ghost-unique"></div>
        </div>
        <div id="ghost-quote" onclick="restoreOracle()">
            “我们如今仿佛对镜观看，模糊不清，到那时就要面对面了。”
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script>
        window.onload = () => { document.getElementById('fade-in-overlay').style.opacity = '0'; }
        let scene, camera, renderer, linesGrass, metalFlower, bokehParticles, ghostMaterial, ghostLight;
        const mouse = new THREE.Vector2();
        let gardenActive = false, isAwakening = false;
        let currentScale = { x: 2.5, y: 2.5, z: 2.5 }, targetScale = { x: 2.5, y: 2.5, z: 2.5 };

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            // ⚠️ 核心修复 3：防止彩色杂点产生的颜色空间设置
            renderer.outputColorSpace = 'srgb';
            document.body.appendChild(renderer.domElement);
            
            // 光斑纹理生成：使用更纯净的高斯模糊
            const pCanvas = document.createElement('canvas'); pCanvas.width = 128; pCanvas.height = 128;
            const pCtx = pCanvas.getContext('2d');
            const grad = pCtx.createRadialGradient(64, 64, 0, 64, 64, 60);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.4)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            pCtx.fillStyle = grad; pCtx.fillRect(0, 0, 128, 128);
            const pTexture = new THREE.CanvasTexture(pCanvas);

            // ⚠️ 核心修复 4：光斑数量减少并防止贴脸
            const bokehCount = 126; // 减少10%
            const bokehPos = new Float32Array(bokehCount * 3);
            for(let i = 0; i < bokehCount; i++) {
                bokehPos[i*3] = (Math.random() - 0.5) * 35;
                bokehPos[i*3+1] = (Math.random() - 0.5) * 35;
                bokehPos[i*3+2] = Math.random() * 15 - 18; // 强制推远，防止贴脸
            }
            const bokehGeo = new THREE.BufferGeometry();
            bokehGeo.setAttribute('position', new THREE.BufferAttribute(bokehPos, 3));
            bokehParticles = new THREE.Points(bokehGeo, new THREE.PointsMaterial({
                color: 0xffffff, size: 0.18, // 尺寸限制在1/5以内
                map: pTexture, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(bokehParticles);

            // 草地与环境
            const linesGeo = new THREE.BufferGeometry(); const positions = new Float32Array(5000 * 18);
            for(let i=0; i<5000; i++) {
                const x = Math.random()*80-40; const z = Math.random()*50-25; const h = 1.0+Math.random()*1.5;
                positions[i*18+0]=x; positions[i*18+1]=-1; positions[i*18+2]=z;
                positions[i*18+15]=x; positions[i*18+16]=-1+h; positions[i*18+17]=z;
            }
            linesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            linesGrass = new THREE.LineSegments(linesGeo, new THREE.LineBasicMaterial({ color: 0xcceeff, transparent: true, opacity: 0.3 }));
            scene.add(linesGrass);

            ghostMaterial = new THREE.MeshPhysicalMaterial({ side: THREE.DoubleSide });
            new THREE.OBJLoader().load('flower.obj', (o) => {
                o.traverse(c => { if(c.isMesh) c.material = ghostMaterial; });
                metalFlower = new THREE.Group(); metalFlower.add(o);
                metalFlower.position.y = 1.5; metalFlower.visible = false; scene.add(metalFlower);
            });

            ghostLight = new THREE.PointLight(0xffffff, 0, 15); scene.add(ghostLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            animate();
        }

        function animate() {
            requestAnimationFrame(animate); const time = performance.now() * 0.001;
            if(linesGrass) {
                const pos = linesGrass.geometry.attributes.position.array;
                for(let i=0; i<5000; i++) { pos[i*18+15] += Math.sin(time+pos[i*18+2]*0.2)*0.005; }
                linesGrass.geometry.attributes.position.needsUpdate = true;
            }
            if(bokehParticles) { 
                bokehParticles.rotation.y = time * 0.02; 
                bokehParticles.position.y = Math.sin(time*0.5)*0.2;
            }
            if(metalFlower && metalFlower.visible) {
                if(isAwakening) {
                    currentScale.x += (targetScale.x - currentScale.x)*0.05;
                    currentScale.y += (targetScale.y - currentScale.y)*0.05;
                    metalFlower.scale.set(currentScale.x, currentScale.y, currentScale.x);
                    metalFlower.rotation.y += 0.15;
                    if(Math.abs(targetScale.y - currentScale.y)<0.01) isAwakening=false;
                } else {
                    metalFlower.rotation.y += 0.005;
                    metalFlower.position.y = 1.5 + Math.sin(time)*0.1;
                }
            }
            renderer.render(scene, camera);
        }

        function showInput() { document.getElementById('intro-box').style.display='none'; document.getElementById('dive-btn').style.display='none'; document.getElementById('birthday-ui').style.display='flex'; setTimeout(()=>document.getElementById('birthday-ui').style.opacity='1',50); }

        function awakenGhost() {
            const inputVal = document.getElementById('bday-input').value; if(inputVal.length!==4) return;
            const month = parseInt(inputVal.substring(0,2)), day = parseInt(inputVal.substring(2,4));
            
            // 0203 专用逻辑
            if(inputVal === "0203") {
                ghostMaterial.color.set('#b0c4de'); ghostMaterial.emissive.set('#4682b4');
                targetScale.x = 2.8 * 0.9; targetScale.y = 3.2;
            } else {
                ghostMaterial.color.setHSL(month/12, 0.3, 0.5);
                targetScale.x = 1.5 + (month/12)*2.5; targetScale.y = 1.5 + (day/31)*3;
            }
            
            metalFlower.visible = true; isAwakening = true;
            document.getElementById('ui-layer').style.opacity='0';
            setTimeout(()=>document.getElementById('ui-layer').style.display='none', 1500);
            
            document.getElementById('ghost-coord').innerText = `[ 坐标：${inputVal} | 状态：觉醒 ]`;
            document.getElementById('ghost-oracle').innerText = `在这抹微光浸染的频率中，你正穿透宿命定义的壳，寻找通向自身之途的艰难，并最终确立你唯一的精神主权。`;
            document.getElementById('ghost-unique').innerText = `在物理世界，${inputVal} 也许只是时间刻度；但在躯壳之外，这是系统无法复刻的绝对参数。`;
            document.getElementById('ghost-info').style.opacity = '1';
            gardenActive = true;
        }

        init3D();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
