<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躯壳之外 | 觉醒数字花园</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
            font-family: 'PingFang SC', 'Helvetica Neue', 'Hiragino Sans GB', sans-serif; color: #fff; 
            touch-action: none;
        }
        
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 110vh;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center bottom;
            z-index: 0;
        }

        canvas { 
            display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 1; pointer-events: none;
        }

        #glass-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0); 
            backdrop-filter: none; 
            -webkit-backdrop-filter: none;
            z-index: 5; transition: opacity 2.5s ease; pointer-events: none;
        }

        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.38); /* ⚠️ 压暗 3% */
            z-index: 10; transition: opacity 1.5s ease;
        }

        #intro-box {
            text-align: center; width: 90%; max-width: 520px; padding: 0;
            margin-bottom: clamp(20px, 5vh, 40px);
        }
        #intro-box h1 {
            font-size: clamp(16px, 4vw, 20px); font-weight: 400; letter-spacing: 5px; 
            margin-bottom: 15px; color: #fff; line-height: 1.4;
        }
        .en-title {
            display: block; font-size: clamp(9px, 2vw, 11px); font-family: monospace; 
            letter-spacing: 8px; color: rgba(255,255,255,0.5); margin-top: 8px; font-weight: 300;
        }
        #intro-box p {
            font-size: clamp(11px, 2.5vw, 13px); font-weight: 300; line-height: 2.2; 
            letter-spacing: 2px; color: rgba(255,255,255,0.85);
        }

        .btn-style { 
            background: rgba(255, 255, 255, 0.9); color: #000; border: none; 
            padding: clamp(10px, 2vh, 12px) clamp(30px, 6vw, 40px); border-radius: 30px; 
            cursor: pointer; font-size: clamp(11px, 2.5vw, 13px); letter-spacing: 2px; font-weight: 600; 
            transition: all 0.4s ease; pointer-events: auto;
        }
        .btn-style:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,255,255,0.3); }
        
        #birthday-ui {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1.5s ease; pointer-events: auto; text-align: center;
        }

        #bday-input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.6);
            color: #fff; font-size: clamp(26px, 6vw, 35px); text-align: center; 
            width: clamp(140px, 40vw, 180px); letter-spacing: 12px; outline: none; 
            font-family: 'Courier New', Courier, monospace; font-weight: 300;
            margin-bottom: 35px; padding-bottom: 5px; transition: border-color 0.3s ease;
        }
        #bday-input:focus { border-bottom: 1px solid rgba(255,255,255,1); }
        #bday-input::placeholder { color: rgba(255,255,255,0.3); }

        #fade-in-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; pointer-events: none; transition: opacity 2s ease; }

        #ghost-info {
            position: fixed; bottom: clamp(20px, 5vh, 40px); left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.9); text-align: center; font-weight: 300; line-height: 1.8;
            opacity: 0; transition: opacity 2.5s ease; z-index: 100; pointer-events: none;
            width: 95vw; max-width: 750px;
        }
        
        #oracle-group { will-change: transform, opacity, filter, letter-spacing; }

        .ghost-header {
            font-size: clamp(9px, 2.2vw, 12px); color: #ffffff; margin-bottom: clamp(10px, 2.5vh, 15px); 
            font-family: monospace; letter-spacing: 2px; font-weight: 400; white-space: nowrap;
        }
        
        /* ⚠️ 修复：判词折行，移除 nowrap */
        #ghost-oracle {
            font-size: clamp(9.5px, 2.6vw, 13px); color: #eeeeee; font-weight: 300; letter-spacing: 1.5px; 
            line-height: 2.0; display: inline-block; width: 100%;
        }

        /* ⚠️ 修复：底部小字 8.5px，移除阴影，单行显示 */
        .ghost-footer {
            font-size: 8.5px; color: rgba(255,255,255,0.4); margin-top: 15px;
            letter-spacing: 1px; font-weight: 300; white-space: nowrap;
        }

        #ghost-quote {
            font-size: clamp(9px, 2.6vw, 12.5px); color: #ffffff; font-weight: 400; letter-spacing: 1.2px; 
            display: none; opacity: 0; font-style: italic; line-height: 1.9;
            pointer-events: auto; cursor: pointer; transition: opacity 0.3s ease;
        }
        #ghost-quote:active { opacity: 0.5; }

        @keyframes windDissolve {
            0% { opacity: 1; filter: blur(0px); transform: translate3d(0, 0, 0) skewX(0deg); letter-spacing: 1.5px; }
            100% { opacity: 0; filter: blur(12px); transform: translate3d(30px, -20px, 0) skewX(-10deg) scale(1.02); letter-spacing: 6px; }
        }
        .dissolve-anim { animation: windDissolve 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        @keyframes fadeInQuote { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-anim { animation: fadeInQuote 2.5s ease forwards; }
    </style>
</head>
<body>
    <div id="fade-in-overlay"></div>
    <div id="bg-image"></div>
    <div id="glass-overlay"></div>

    <div id="ui-layer">
        <div id="intro-box">
            <h1>躯壳之外<span class="en-title">BEYOND THE SHELL</span></h1>
            <p>这里是过滤数字噪点的私人温室。<br>请在此键入你的诞生之日（如 0203），<br>这串你在物理世界的初始时间戳，将作为唤醒的唯一密钥。</p>
        </div>
        <button id="dive-btn" class="btn-style" onclick="showInput()">构建密钥</button>
        <div id="birthday-ui">
            <input type="text" id="bday-input" maxlength="4" placeholder="MMDD" autocomplete="off" pattern="\d*" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
            <button id="awaken-btn" class="btn-style" onclick="awakenGhost()">唤醒 Ghost</button>
        </div>
    </div>

    <div id="ghost-info">
        <div id="oracle-group">
            <div class="ghost-header" id="ghost-coord"></div>
            <div id="ghost-oracle"></div>
            <div class="ghost-footer" id="ghost-unique"></div>
        </div>
        <div id="ghost-quote" onclick="restoreOracle()">
            <div style="display:block; white-space:nowrap; padding-bottom:2px;">“我们如今仿佛对镜观看，模糊不清，到那时就要面对面了，</div>
            <div style="display:block; white-space:nowrap;">我如今所知道的有限，到那时就全知道，如同造物主知道我一样。”</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <script>
        window.onload = () => { document.getElementById('fade-in-overlay').style.opacity = '0'; }
        let scene, camera, renderer, linesGrass, metalFlower, bokehParticles;
        const mouse = new THREE.Vector2(), targetFollow = new THREE.Vector3();
        let gardenActive = false, isAwakening = false;
        let currentScale = { x: 2.5, y: 2.5, z: 2.5 }, targetScale = { x: 2.5, y: 2.5, z: 2.5 };
        let heartBase = 1.0, heartSub = 0.5, animTimer1, animTimer2;

        function generateOracle(month, day) {
            const bases = ["如季风拂过苔藓，带着潮湿的生机", "像结晶于深海的琥珀，封存着远古星晖", "如游走在云端的电波，不沾染半分尘埃", "似月色下的无声潮汐，在克制中蕴含汹涌", "如万物封冻前的最后一抹余温，冷峻而慈悲", "像孤独盘旋的星轨，在虚无中确立唯一坐标"];
            const hashA = (month * 13 + day * 7) % bases.length;
            return `你的 Ghost ${bases[hashA]}。`;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const envCanvas = document.createElement('canvas'); envCanvas.width = 64; envCanvas.height = 64;
            const envCtx = envCanvas.getContext('2d'); const envGrad = envCtx.createRadialGradient(32, 32, 0, 32, 32, 32); envGrad.addColorStop(0, 'rgba(255, 255, 255, 1)'); envGrad.addColorStop(1, 'rgba(10, 15, 20, 1)'); envCtx.fillStyle = envGrad; envCtx.fillRect(0, 0, 64, 64);
            scene.environment = new THREE.CanvasTexture(envCanvas); scene.environment.mapping = THREE.EquirectangularReflectionMapping;

            const grassWidth = 80, grassDepth = 50, lineCount = 5500;
            const linesGeometry = new THREE.BufferGeometry(); const positions = new Float32Array(lineCount * 18); 
            for (let i = 0; i < lineCount; i++) { const x = Math.random() * grassWidth - grassWidth/2; const z = Math.random() * grassDepth - grassDepth/2; const h = 1.0 + Math.random() * 1.5; positions[i*18+0] = x; positions[i*18+1] = -1; positions[i*18+2] = z; positions[i*18+15] = x; positions[i*18+16] = -1 + h; positions[i*18+17] = z; }
            linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            linesGrass = new THREE.LineSegments(linesGeometry, new THREE.LineBasicMaterial({ color: 0xcceeff, transparent: true, opacity: 0.35 }));
            scene.add(linesGrass);

            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; 
            const context = canvas.getContext('2d'); const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32); gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)'); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); context.fillStyle = gradient; context.fillRect(0, 0, 64, 64);
            const particleTexture = new THREE.CanvasTexture(canvas);

            const bokehGeometry = new THREE.BufferGeometry(); const bokehPositions = new Float32Array(140 * 3);
            for(let i = 0; i < 140; i++) { bokehPositions[i*3] = (Math.random() - 0.5) * 35; bokehPositions[i*3+1] = (Math.random() - 0.5) * 35; bokehPositions[i*3+2] = Math.random() * 18 - 15; }
            bokehGeometry.setAttribute('position', new THREE.BufferAttribute(bokehPositions, 3));
            bokehParticles = new THREE.Points(bokehGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, sizeAttenuation: true, transparent: true, opacity: 0.85, map: particleTexture, depthWrite: false, depthTest: false, blending: THREE.AdditiveBlending }));
            scene.add(bokehParticles);

            ghostMaterial = new THREE.MeshPhysicalMaterial({ side: THREE.DoubleSide });
            new THREE.OBJLoader().load('flower.obj', function (object) {
                object.traverse(function (child) { if (child.isMesh) child.material = ghostMaterial; });
                const box = new THREE.Box3().setFromObject(object); object.position.sub(box.getCenter(new THREE.Vector3())); 
                metalFlower = new THREE.Group(); metalFlower.add(object); metalFlower.scale.set(currentScale.x, currentScale.y, currentScale.z); metalFlower.position.y = 1.5; metalFlower.visible = false; scene.add(metalFlower);
            });
            ghostLight = new THREE.PointLight(0xffffff, 0, 12); scene.add(ghostLight); scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            window.addEventListener('mousemove', (e) => { mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; });
            window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1; } }, { passive: true });
            window.addEventListener('resize', onWindowResize); animate();
        }

        function animate() {
            requestAnimationFrame(animate); const time = performance.now() * 0.001;
            if(linesGrass) { const pos = linesGrass.geometry.attributes.position.array; for (let i = 0; i < 5500; i++) { const wind = Math.sin(time * 1.5 + pos[i*18 + 2] * 0.2); const mouseAvoid = gardenActive ? mouse.x * 1.5 : 0; const off = wind + mouseAvoid; pos[i*18 + 3] = pos[i*18 + 0] + off * 0.08; pos[i*18 + 9] = pos[i*18 + 0] + off * 0.3; pos[i*18 + 15] = pos[i*18 + 0] + off * 0.8; } linesGrass.geometry.attributes.position.needsUpdate = true; }
            if(bokehParticles) { bokehParticles.rotation.y = time * 0.03 + (isAwakening ? 0.08 : 0); bokehParticles.position.y = Math.sin(time * 0.5) * 0.5; }
            if(metalFlower && metalFlower.visible) { 
                if(isAwakening) { currentScale.x += (targetScale.x - currentScale.x) * 0.06; currentScale.y += (targetScale.y - currentScale.y) * 0.06; currentScale.z += (targetScale.z - currentScale.z) * 0.06; metalFlower.scale.set(currentScale.x, currentScale.y, currentScale.z); metalFlower.rotation.y += 0.25; metalFlower.rotation.z += 0.05; if (Math.abs(targetScale.y - currentScale.y) < 0.05) isAwakening = false;
                } else if(gardenActive) { targetFollow.set(mouse.x * 4, mouse.y * 3 + 1.5, 5); metalFlower.lookAt(targetFollow); metalFlower.rotation.z += 0.002; } else { metalFlower.rotation.y += 0.003; }
                metalFlower.position.y = 1.5 + Math.sin(time * heartBase) * 0.15 + Math.sin(time * heartSub) * 0.05;
                if(gardenActive) ghostLight.intensity = 1.5 + Math.sin(time * heartBase * 2) * 0.5; ghostLight.position.copy(metalFlower.position);
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function showInput() { document.getElementById('intro-box').style.display = 'none'; document.getElementById('dive-btn').style.display = 'none'; document.getElementById('birthday-ui').style.display = 'flex'; setTimeout(() => { document.getElementById('birthday-ui').style.opacity = '1'; }, 50); document.getElementById('bday-input').focus(); }
        function startOracleTimer() { clearTimeout(animTimer1); clearTimeout(animTimer2); const og = document.getElementById('oracle-group'); const qe = document.getElementById('ghost-quote'); animTimer1 = setTimeout(() => { og.classList.add('dissolve-anim'); animTimer2 = setTimeout(() => { og.style.display = 'none'; qe.style.display = 'block'; qe.classList.add('fade-in-anim'); }, 2500); }, 15000); }
        function restoreOracle() { document.getElementById('ghost-quote').style.display = 'none'; document.getElementById('oracle-group').style.display = 'block'; document.getElementById('oracle-group').classList.remove('dissolve-anim'); void document.getElementById('oracle-group').offsetWidth; startOracleTimer(); }

        function awakenGhost() {
            const inputVal = document.getElementById('bday-input').value; if(inputVal.length !== 4) { alert("请输入完整的四位数字（如 0203）"); return; }
            const month = parseInt(inputVal.substring(0, 2)), day = parseInt(inputVal.substring(2, 4));
            if(month < 1 || month > 12 || day < 1 || day > 31) return;
            let colorDesc = "", phaseName = "";
            ghostMaterial.color.set('#fff'); ghostMaterial.emissive.set('#000'); ghostMaterial.metalness = 0; ghostMaterial.roughness = 0.5; ghostMaterial.transmission = 0; ghostMaterial.ior = 1.5; ghostMaterial.thickness = 0; ghostMaterial.opacity = 1;

            if (inputVal === "0203") {
                const uniqueColor = new THREE.Color().setHSL(0.645, 0.65, 0.7);
                ghostMaterial.color.copy(uniqueColor); ghostMaterial.emissive.copy(uniqueColor); ghostMaterial.roughness = 0.9; ghostMaterial.emissiveIntensity = 0.3; ghostLight.color.copy(uniqueColor); ghostLight.intensity = 2.0; colorDesc = "深邃的丹宁蓝频段"; phaseName = "暗物质瓷";
                // ⚠️ 修正：0203 宽度压窄 20%
                targetScale.x = (1.3 + (month / 12) * 3.0) * 0.8;
            } else {
                let rawHue = ((month - 1) * 31 + day) % 360; if (rawHue > 340 || rawHue < 20) rawHue = (rawHue + 40) % 360;
                const hue = rawHue / 360; const saturation = 0.2 + (day / 31) * 0.25; const lightness = 0.35 + (month % 3) * 0.15; const uniqueColor = new THREE.Color().setHSL(hue, saturation, lightness);
                if (rawHue < 50) colorDesc = "琥珀金"; else if (rawHue < 80) colorDesc = "微光绿"; else if (rawHue < 170) colorDesc = "冰蓝"; else if (rawHue < 250) colorDesc = "丹宁蓝"; else if (rawHue < 300) colorDesc = "魅影紫"; else colorDesc = "千禧粉";
                const phaseVal = (month * 7 + day * 11) % 6;
                if (phaseVal === 1) { ghostMaterial.color.copy(uniqueColor); ghostMaterial.transmission = 1.0; ghostMaterial.ior = 1.33; ghostMaterial.roughness = 0.1; ghostMaterial.thickness = 1.5; phaseName = "灵动水态";
                } else if (phaseVal === 2) { ghostMaterial.color.copy(uniqueColor).multiplyScalar(0.2); ghostMaterial.transmission = 1.0; ghostMaterial.ior = 1.55; ghostMaterial.roughness = 0.02; ghostMaterial.thickness = 2.0; ghostMaterial.attenuationColor = uniqueColor; ghostMaterial.attenuationDistance = 0.5; phaseName = "高折射琉璃"; ghostLight.intensity = 0.4;
                } else { ghostMaterial.color.set('#1a1a1a'); ghostMaterial.emissive.copy(uniqueColor); ghostMaterial.roughness = 0.9; phaseName = "暗物质瓷"; }
                ghostLight.color.copy(uniqueColor); if(phaseVal!==2) ghostLight.intensity = 2.0;
                targetScale.x = 1.3 + (month / 12) * 3.0;
            }
            ghostMaterial.needsUpdate = true; targetScale.y = 1.3 + (day / 31) * 3.5; metalFlower.visible = true; isAwakening = true; document.getElementById('ui-layer').style.opacity = '0'; setTimeout(() => { document.getElementById('ui-layer').style.display = 'none'; }, 1500); document.getElementById('ghost-coord').innerHTML = `[ 坐标：${inputVal} | 相态：${phaseName} | 色谱：${colorDesc} ]`; document.getElementById('ghost-oracle').innerHTML = generateOracle(month, day); document.getElementById('ghost-unique').innerHTML = `在物理世界，${inputVal} 也许只是一个时间刻度；但在躯壳之外，这是系统无法复刻的绝对参数。`; document.getElementById('ghost-info').style.opacity = '1'; gardenActive = true; startOracleTimer();
        }
        document.getElementById('bday-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') awakenGhost(); }); init3D();
    </script>
</body>
</html>
